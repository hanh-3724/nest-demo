services:
  nestjs-demo-postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  nestjs-demo-backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: nestjs-demo-postgres
      DB_PORT: 5432
    ports:
      - "${APP_PORT:-3636}:${APP_PORT:-3636}"
    depends_on:
      nestjs-demo-postgres:
        condition: service_healthy

volumes:
  postgres_data:
